apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: sample-namespace
  name: sample-deployment
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-app
  replicas: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-app
    spec:
      # serviceAccountName: sample-serviceaccount #コンテナがAWSサービスにアクセスする際に必要
      containers:
      - image: 140083316867.dkr.ecr.us-east-1.amazonaws.com/flask:latest
        # env:
        # - name: SAMPLE
        #   value: sample
        resources:
          limits:
            memory: "700Mi"  #Fargateはメモリ予約に 256 MB追加される
            cpu: "0.5"
          requests:
            memory: "700Mi"
            cpu: "0.5"
        imagePullPolicy: Always
        name: sample-app
        ports:
        - containerPort: 8080

