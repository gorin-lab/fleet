apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-myapp
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - name: hub
        server: https://kubernetes.default.svc
        env: prod
      - name: spoke
        server: https://4449BC09C3F558AA193301BB5C9E4AE5.gr7.us-east-1.eks.amazonaws.com
        env: canary
  template:
    metadata:
      name: '{{name}}-myapp'
    spec:
      project: default
      source:
        repoURL: https://github.com/gorin-lab/fleet
        targetRevision: main
        path: apps/myapp/overlays/{{env}}
      destination:
        server: '{{server}}'
        namespace: myapp
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
